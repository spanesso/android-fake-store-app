name: Release firmado

on:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ─────────────────────────────────────────────
  # Compilar AAB de producción firmado
  # ─────────────────────────────────────────────
  build-release:
    name: Compilar bundle de producción firmado
    runs-on: ubuntu-latest
    outputs:
      bundle-path: ${{ steps.bundle.outputs.bundle-path }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Dar permisos al wrapper
        run: chmod +x gradlew

      - name: Decodificar keystore de producción
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > release.keystore

      - name: Compilar bundle de producción
        id: bundle
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleProdRelease
          echo "bundle-path=app/build/outputs/bundle/prodRelease/app-prod-release.aab" >> $GITHUB_OUTPUT

      - name: Subir AAB como artefact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: app/build/outputs/bundle/prodRelease/*.aab
          retention-days: 30

      - name: Limpiar keystore (seguridad)
        if: always()
        run: rm -f release.keystore

  # ─────────────────────────────────────────────
  # Subir bundle a Google Play Internal Testing
  # ─────────────────────────────────────────────
  upload-play:
    name: Subir a Google Play Internal Testing
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Dar permisos al wrapper
        run: chmod +x gradlew

      - name: Decodificar keystore de producción
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > release.keystore

      - name: Escribir credenciales de Google Play
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > play-credentials.json
          echo "ANDROID_PUBLISHER_CREDENTIALS_FILE=${{ github.workspace }}/play-credentials.json" >> $GITHUB_ENV

      - name: Publicar bundle en Internal Testing
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew publishProdReleaseBundle

      - name: Limpiar credenciales
        if: always()
        run: |
          rm -f release.keystore
          rm -f play-credentials.json

  # ─────────────────────────────────────────────
  # Verificar disponibilidad de secrets de Google
  # ─────────────────────────────────────────────
  check-google-secrets:
    name: Verificar secrets de Google Cloud
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$SA_JSON" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────
  # Subir mapping.txt a Firebase Crashlytics
  # ─────────────────────────────────────────────
  upload-mapping:
    name: Subir mapping a Crashlytics
    runs-on: ubuntu-latest
    needs: [build-release, check-google-secrets]
    if: needs.check-google-secrets.outputs.available == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Descargar artefact del bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: app/build/outputs/bundle/prodRelease/

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools@14.3.1 --ignore-scripts

      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Dar permisos al wrapper
        run: chmod +x gradlew

      - name: Decodificar keystore (para generar el mapping)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > release.keystore

      - name: Compilar para obtener mapping.txt
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleProdRelease

      - name: Subir mapping.txt a Crashlytics
        run: |
          firebase crashlytics:mappingfile:upload \
            --app ${{ vars.FIREBASE_APP_ID }} \
            app/build/outputs/mapping/prodRelease/mapping.txt

      - name: Limpiar keystore
        if: always()
        run: rm -f release.keystore

  # ─────────────────────────────────────────────
  # Crear GitHub Release con release notes
  # ─────────────────────────────────────────────
  create-release:
    name: Crear GitHub Release
    runs-on: ubuntu-latest
    needs: [upload-play, upload-mapping]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar AAB
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: artifacts/

      - name: Crear GitHub Release con release notes automáticas
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.aab
          token: ${{ secrets.GITHUB_TOKEN }}
