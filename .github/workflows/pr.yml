name: Validación de Pull Request

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ─────────────────────────────────────────────
  # Preparación: checkout + Java + caché Gradle
  # ─────────────────────────────────────────────
  setup:
    name: Preparar entorno
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Caché de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Dar permisos al wrapper de Gradle
        run: chmod +x gradlew

  # ─────────────────────────────────────────────
  # Análisis estático: Detekt + ktlint
  # ─────────────────────────────────────────────
  lint:
    name: Análisis estático (Detekt + ktlint)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - name: Ejecutar Detekt
        run: ./gradlew detekt
      - name: Ejecutar ktlint
        run: ./gradlew ktlintCheck

  # ─────────────────────────────────────────────
  # Tests unitarios
  # ─────────────────────────────────────────────
  test:
    name: Tests unitarios
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - name: Ejecutar tests unitarios (flavor dev)
        run: ./gradlew testDevDebugUnitTest
      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'
          retention-days: 7

  # ─────────────────────────────────────────────
  # Cobertura con Kover
  # ─────────────────────────────────────────────
  coverage:
    name: Cobertura (Kover)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - name: Generar informe de cobertura Kover (XML + HTML)
        run: ./gradlew koverXmlReportDevDebug koverHtmlReportDevDebug
      - name: Subir informe de cobertura como artefact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            **/build/reports/kover/**
          retention-days: 14

  # ─────────────────────────────────────────────
  # Compilación del APK de debug
  # ─────────────────────────────────────────────
  build:
    name: Compilar APK debug
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - name: Compilar APK dev debug
        run: ./gradlew assembleDevDebug
      - name: Subir APK debug como artefact
        uses: actions/upload-artifact@v4
        with:
          name: apk-dev-debug
          path: app/build/outputs/apk/dev/debug/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # SonarCloud (opcional — solo si SONAR_TOKEN está presente)
  # ─────────────────────────────────────────────
  sonarcloud:
    name: Análisis SonarCloud
    runs-on: ubuntu-latest
    needs: coverage
    if: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - name: Generar informe Kover para SonarCloud
        run: ./gradlew koverXmlReportDevDebug
      - name: Análisis SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
