name: Integración continua (develop)

on:
  push:
    branches: [develop]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ─────────────────────────────────────────────
  # Reutiliza todos los checks del pipeline de PR
  # ─────────────────────────────────────────────
  lint:
    name: Análisis estático (Detekt + ktlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - run: ./gradlew detekt ktlintCheck

  test:
    name: Tests unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - run: ./gradlew testDevDebugUnitTest

  coverage:
    name: Cobertura (Kover)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - run: ./gradlew koverXmlReportDevDebug koverHtmlReportDevDebug
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report-main
          path: '**/build/reports/kover/**'
          retention-days: 14

  build:
    name: Compilar APK staging debug
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - run: ./gradlew assembleStagingDebug
      - uses: actions/upload-artifact@v4
        with:
          name: apk-staging-debug
          path: app/build/outputs/apk/staging/debug/*.apk
          retention-days: 3

  sonarcloud:
    name: Análisis SonarCloud
    runs-on: ubuntu-latest
    needs: coverage
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - run: ./gradlew koverXmlReportDevDebug
      - uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────
  # Pruebas instrumentadas en Firebase Test Lab
  # ─────────────────────────────────────────────
  instrumented-tests:
    name: Tests instrumentados (Firebase Test Lab)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Instalar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Compilar APK de tests instrumentados
        run: ./gradlew assembleDevDebug assembleDevDebugAndroidTest

      - name: Ejecutar tests en Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app app/build/outputs/apk/dev/debug/app-dev-debug.apk \
            --test app/build/outputs/apk/androidTest/dev/debug/app-dev-debug-androidTest.apk \
            --device model=Pixel6,version=33,locale=es,orientation=portrait \
            --timeout 5m \
            --results-bucket gs://${{ vars.FIREBASE_TEST_RESULTS_BUCKET || 'firebase-test-results' }}

  # ─────────────────────────────────────────────
  # Distribución a QA con Firebase App Distribution
  # ─────────────────────────────────────────────
  distribute-staging:
    name: Distribuir a QA (Firebase App Distribution)
    runs-on: ubuntu-latest
    needs: instrumented-tests
    if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew

      - name: Compilar APK staging debug
        run: ./gradlew assembleStagingDebug

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribuir a grupo qa-internal
        run: |
          firebase appdistribution:distribute \
            app/build/outputs/apk/staging/debug/app-staging-debug.apk \
            --app ${{ vars.FIREBASE_APP_ID }} \
            --groups "qa-internal" \
            --release-notes "Rama: ${{ github.ref_name }} | Commit: ${{ github.sha }}"
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
