name: Integración continua (develop)

on:
  push:
    branches: [develop]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ─────────────────────────────────────────────
  # Reutiliza todos los checks del pipeline de PR
  # ─────────────────────────────────────────────
  lint:
    name: Análisis estático (Detekt + ktlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - run: ./gradlew detekt ktlintCheck

  test:
    name: Tests unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - run: ./gradlew testDevDebugUnitTest

  coverage:
    name: Cobertura (Kover)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - run: ./gradlew koverXmlReportDevDebug koverHtmlReportDevDebug
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report-main
          path: '**/build/reports/kover/**'
          retention-days: 14

  build:
    name: Compilar APK staging debug
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - run: ./gradlew assembleStagingDebug
      - uses: actions/upload-artifact@v4
        with:
          name: apk-staging-debug
          path: app/build/outputs/apk/staging/debug/*.apk
          retention-days: 3

  sonarcloud:
    name: Análisis SonarCloud
    runs-on: ubuntu-latest
    needs: coverage
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - run: ./gradlew koverXmlReportDevDebug
      - uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────
  # Verificar disponibilidad de secrets de Google
  # ─────────────────────────────────────────────
  check-google-secrets:
    name: Verificar secrets de Google Cloud
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          APP_ID: ${{ vars.FIREBASE_APP_ID }}
        run: |
          if [ -n "$SA_JSON" ] && [ -n "$APP_ID" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Firebase omitido: configura FIREBASE_SERVICE_ACCOUNT_JSON (secret) y FIREBASE_APP_ID (variable) en el repo."
          fi

  # ─────────────────────────────────────────────
  # Distribución a QA con Firebase App Distribution
  # Depende solo de build y check-google-secrets,
  # independiente de Test Lab para garantizar entrega.
  # ─────────────────────────────────────────────
  distribute-staging:
    name: Distribuir a QA (Firebase App Distribution)
    runs-on: ubuntu-latest
    needs: [build, check-google-secrets]
    if: needs.check-google-secrets.outputs.available == 'true' && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Escribir google-services.json
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Dar permisos al wrapper
        run: chmod +x gradlew
      - name: Compilar APK prod debug
        run: ./gradlew assembleProdDebug
      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools@14.3.1 --ignore-scripts
      - name: Distribuir a grupo qa-internal
        run: |
          firebase appdistribution:distribute \
            app/build/outputs/apk/prod/debug/app-prod-debug.apk \
            --app "${{ vars.FIREBASE_APP_ID }}" \
            --groups "qa-internal" \
            --release-notes "Commit: ${{ github.sha }} | ${{ github.event.head_commit.message }}"
